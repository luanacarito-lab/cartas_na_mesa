<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Sistema Cartomante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="assets/css/theme-widget.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />

  <!-- Dependências do Supabase e Proteção de Rotas -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
      background: radial-gradient(circle at center, #130f26 0%, #080612 100%);
      overflow-x: hidden;
    }
    
    .login-wrapper {
      width: 100%;
      max-width: 440px;
      z-index: 10;
      perspective: 1000px;
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 30px;
      animation: fadeInDown 1s ease-out;
    }
    
    .login-header h1 {
      font-family: var(--font-decorative);
      color: var(--gold-color);
      font-size: 2.5rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 15px rgba(199, 162, 122, 0.4), 0 0 30px rgba(110, 90, 171, 0.3);
      letter-spacing: 1px;
    }
    
    .login-header p {
      font-family: var(--font-classic);
      color: var(--text-secondary);
      font-style: italic;
      font-size: 0.95rem;
      margin: 0;
      opacity: 0.8;
    }
    
    .login-card {
      padding: 40px 35px;
      border: 1px solid rgba(199, 162, 122, 0.18);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 25px rgba(110, 90, 171, 0.15);
      border-radius: 16px;
      background: rgba(20, 16, 38, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .form-group {
      margin-bottom: 22px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .mystic-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(199, 162, 122, 0.2);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 12px 16px;
      width: 100%;
      box-sizing: border-box;
      font-family: var(--font-modern);
      font-size: 0.95rem;
      transition: all var(--transition-normal);
    }

    .mystic-input:focus {
      outline: none;
      border-color: var(--gold-color);
      background: rgba(255, 255, 255, 0.07);
      box-shadow: 0 0 12px rgba(199, 162, 122, 0.25);
    }
    
    .register-section {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid rgba(199, 162, 122, 0.15);
      text-align: center;
    }
    
    .register-intro {
      font-family: var(--font-classic);
      color: var(--text-secondary);
      font-size: 0.88rem;
      font-style: italic;
      margin: 0 0 18px 0;
    }
    
    .register-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 400px) {
      .register-actions {
        grid-template-columns: 1fr;
      }
    }
    
    .register-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      border-radius: 8px;
      text-decoration: none;
      transition: all var(--transition-normal);
      border: 1px solid rgba(199, 162, 122, 0.15);
      cursor: pointer;
    }

    .register-btn i {
      font-size: 1.2rem;
    }

    .register-btn span {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-modern);
    }
    
    .consulente-btn {
      background: rgba(110, 90, 171, 0.1);
      color: #b7a9f2;
      border-color: rgba(110, 90, 171, 0.25);
    }
    
    .consulente-btn:hover {
      background: rgba(110, 90, 171, 0.25);
      border-color: #9f8cf2;
      box-shadow: 0 0 15px rgba(110, 90, 171, 0.35);
      transform: translateY(-2px);
    }
    
    .cartomante-btn {
      background: rgba(199, 162, 122, 0.05);
      color: var(--gold-color);
      border-color: rgba(199, 162, 122, 0.25);
    }
    
    .cartomante-btn:hover {
      background: rgba(199, 162, 122, 0.15);
      border-color: var(--gold-color);
      box-shadow: 0 0 15px rgba(199, 162, 122, 0.3);
      transform: translateY(-2px);
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="theme-night mode-dark">
  <script>
    (function() {
      try {
        var s = localStorage.getItem('cartomante_app_state');
        if (s) {
          var state = JSON.parse(s);
          var period = state.currentPeriod || 'night';
          var lighting = state.lightingMode || 'dark';
          if (state.themeChoice === 'auto') {
            var hours = new Date().getHours();
            if (hours >= 6 && hours < 12) { period = 'morning'; lighting = 'light'; }
            else if (hours >= 12 && hours < 17) { period = 'afternoon'; lighting = 'light'; }
            else if (hours >= 17 && hours < 20) { period = 'sunset'; lighting = 'medium'; }
            else { period = 'night'; lighting = 'dark'; }
          } else if (state.themeChoice) {
            if (['morning', 'afternoon', 'sunset', 'night'].indexOf(state.themeChoice) !== -1) {
              period = state.themeChoice;
              lighting = state.lightingMode || 'dark';
            } else if (state.themeChoice === 'light') {
              lighting = 'light';
            } else if (state.themeChoice === 'medium') {
              lighting = 'medium';
            } else if (state.themeChoice === 'dark') {
              lighting = 'dark';
            }
          }
          document.body.className = 'theme-' + period + ' mode-' + lighting;
          if (state.accessibility) {
            if (state.accessibility.highContrast) document.body.classList.add('accessibility-high-contrast');
            if (state.accessibility.largeFont) document.body.classList.add('accessibility-large-font');
            if (state.accessibility.reduceMotion) document.body.classList.add('accessibility-reduce-motion');
            if (state.accessibility.anxietyMode) document.body.classList.add('accessibility-anxiety-mode');
          }
        }
      } catch (e) {}
    })();
  </script>

  <!-- Místicas Estrelas no Fundo (Background atmosphere) -->
  <div id="stars-container" class="starry-sky"></div>
  <div class="ambient-glow" id="glow-1" style="background: radial-gradient(circle, rgba(110, 90, 171, 0.15) 0%, transparent 70%);"></div>
  <div class="ambient-glow" id="glow-2" style="background: radial-gradient(circle, rgba(199, 162, 122, 0.08) 0%, transparent 70%);"></div>

  <div class="login-wrapper">
    <div class="login-header">
      <h1>Cartas na Mesa</h1>
      <p>O portal místico para sua jornada espiritual</p>
    </div>
    
    <div class="login-card glass-panel">
      <h2 style="font-family: var(--font-decorative); color: var(--gold-color); font-size: 1.4rem; margin-top: 0; margin-bottom: 25px; text-align: center; letter-spacing: 0.5px;">Portal de Sintonia</h2>
      
      <!-- Alerta de Confirmação Pendente -->
      <div id="pendingConfirmationAlert" class="glass-panel" style="display: none; padding: 15px; margin-bottom: 20px; border-color: var(--gold-color); background: rgba(199, 162, 122, 0.08); text-align: center; border-radius: 8px; animation: fadeInDown 0.6s ease-out;">
        <i class="fas fa-envelope-open-text" style="color: var(--gold-color); font-size: 1.5rem; margin-bottom: 8px;"></i>
        <h3 style="margin: 0 0 5px 0; font-family: var(--font-decorative); color: var(--gold-color); font-size: 1rem;">Portal em Canalização</h3>
        <p style="margin: 0; font-size: 0.82rem; color: var(--text-secondary); line-height: 1.4;">
          Cadastro enviado! Verifique seu e-mail e clique no link de ativação para firmar seu portal místico.
        </p>
      </div>

      <!-- FORMULÁRIO DE LOGIN UNIFICADO -->
      <form id="loginForm">
        <div class="form-group">
          <label for="login_email">E-mail sagrado</label>
          <input type="email" id="login_email" class="mystic-input" placeholder="seuemail@exemplo.com" required />
        </div>
        <div class="form-group">
          <label for="login_password">Chave Secreta (Senha)</label>
          <input type="password" id="login_password" class="mystic-input" placeholder="••••••••" required />
        </div>
        <button type="submit" id="loginBtn" class="glass-button" style="width: 100%; border-color: var(--gold-color); padding: 13px; justify-content: center; font-weight: 600; margin-top: 10px;">
          <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i> Entrar no Portal
        </button>
      </form>

      <!-- CAMINHO DE CADASTRO -->
      <div class="register-section">
        <p class="register-intro">Ainda não iniciou sua jornada?</p>
        <div class="register-actions">
          <a href="register_cliente.html" class="register-btn consulente-btn">
            <i class="fas fa-user-sparkles"></i>
            <span>Sou Consulente</span>
          </a>
          <a href="register_cartomante.html" class="register-btn cartomante-btn">
            <i class="fas fa-magic"></i>
            <span>Sou Cartomante</span>
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
