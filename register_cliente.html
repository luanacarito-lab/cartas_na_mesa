<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro Consulente – Sistema Cartomante</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel+Decorative:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  
  <!-- Dependências do Supabase e Proteção de Rotas -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="assets/js/auth-guard.js"></script>
  
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    
    .register-wrapper {
      width: 100%;
      max-width: 600px;
      z-index: 10;
    }
    
    .register-header {
      text-align: center;
      margin-bottom: 25px;
    }
    
    .register-header h1 {
      font-family: var(--font-decorative);
      color: var(--gold-color);
      font-size: 2rem;
      margin: 0 0 10px 0;
      text-shadow: 0 0 10px rgba(199, 162, 122, 0.3);
    }
    
    .register-header p {
      font-family: var(--font-classic);
      color: var(--text-secondary);
      font-style: italic;
      font-size: 0.95rem;
      margin: 0;
    }
    
    .register-card {
      padding: 35px 30px;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }
    
    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group.full-width {
      grid-column: span 2;
    }
    
    @media (max-width: 500px) {
      .form-group.full-width {
        grid-column: span 1;
      }
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .register-footer {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid rgba(199, 162, 122, 0.15);
      text-align: center;
    }
    
    .register-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.85rem;
      font-family: var(--font-modern);
      transition: color var(--transition-fast);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .register-footer a:hover {
      color: var(--gold-color);
    }
    
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="theme-night mode-dark">
  <script>
    (function() {
      try {
        var s = localStorage.getItem('cartomante_app_state');
        if (s) {
          var state = JSON.parse(s);
          var period = state.currentPeriod || 'night';
          var lighting = state.lightingMode || 'dark';
          if (state.themeChoice === 'auto') {
            var hours = new Date().getHours();
            if (hours >= 6 && hours < 12) { period = 'morning'; lighting = 'light'; }
            else if (hours >= 12 && hours < 18) { period = 'afternoon'; lighting = 'light'; }
            else { period = 'night'; lighting = 'dark'; }
          } else if (state.themeChoice) {
            if (['morning', 'afternoon', 'night'].indexOf(state.themeChoice) !== -1) {
              period = state.themeChoice;
              lighting = (state.themeChoice === 'night') ? 'dark' : 'light';
            } else if (state.themeChoice === 'light') {
              lighting = 'light';
              if (period === 'night' || period === 'sunset') period = 'morning';
            } else if (state.themeChoice === 'dark') {
              lighting = 'dark';
              if (period === 'morning' || period === 'afternoon') period = 'night';
            }
          }
          document.body.className = 'theme-' + period + ' mode-' + lighting;
          if (state.accessibility) {
            if (state.accessibility.highContrast) document.body.classList.add('accessibility-high-contrast');
            if (state.accessibility.largeFont) document.body.classList.add('accessibility-large-font');
            if (state.accessibility.reduceMotion) document.body.classList.add('accessibility-reduce-motion');
            if (state.accessibility.anxietyMode) document.body.classList.add('accessibility-anxiety-mode');
          }
        }
      } catch (e) {}
    })();
  </script>

  <!-- Místicas Estrelas no Fundo (Background atmosphere) -->
  <div id="stars-container" class="starry-sky"></div>
  <div class="ambient-glow" id="glow-1"></div>
  <div class="ambient-glow" id="glow-2"></div>
  <div class="ambient-glow" id="glow-3"></div>

  <div class="register-wrapper">
    <div class="register-header">
      <h1>Portal do Consulente</h1>
      <p>Cadastre sua assinatura espiritual para consultas particulares</p>
    </div>
    
    <div class="register-card glass-panel">
      <h2 style="font-family: var(--font-decorative); color: var(--gold-color); font-size: 1.3rem; margin-top: 0; margin-bottom: 25px; text-align: center;">Inscrição de Consulente</h2>
      
      <form id="registerClienteForm">
        <div class="form-row">
          <div class="form-group full-width">
            <label for="nome_completo">Nome completo</label>
            <input type="text" id="nome_completo" class="mystic-input" placeholder="Seu nome completo" required />
          </div>
          
          <div class="form-group">
            <label for="email">Seu E-mail</label>
            <input type="email" id="email" class="mystic-input" placeholder="seuemail@exemplo.com" required />
          </div>
          
          <div class="form-group">
            <label for="celular">Celular / WhatsApp</label>
            <input type="tel" id="celular" class="mystic-input" placeholder="(00) 99999-9999" required />
          </div>
          
          <div class="form-group">
            <label for="senha">Chave secreta (Senha)</label>
            <input type="password" id="senha" class="mystic-input" placeholder="Min. 6 caracteres" required />
          </div>
          
          <div class="form-group">
            <label for="confirma_senha">Confirmar Chave secreta</label>
            <input type="password" id="confirma_senha" class="mystic-input" placeholder="••••••••" required />
          </div>
          
          <div class="form-group">
            <label for="data_nascimento">Data de Nascimento</label>
            <input type="date" id="data_nascimento" class="mystic-input" required />
          </div>
          
          <div class="form-group">
            <label for="religiao">Sua Religião / Fé</label>
            <select id="religiao" class="mystic-select" required>
              <option value="">Selecione</option>
              <option value="Umbanda">Umbanda</option>
              <option value="Candomblé">Candomblé</option>
              <option value="Quimbanda">Quimbanda</option>
              <option value="Wicca">Wicca</option>
              <option value="Xamanismo">Xamanismo</option>
              <option value="Espiritualista">Espiritualista</option>
              <option value="Católica">Católica</option>
              <option value="Evangélica">Evangélica</option>
              <option value="Espírita">Espírita Kardecista</option>
              <option value="Nenhuma">Nenhuma / Outra</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="sexo">Gênero</label>
            <select id="sexo" class="mystic-select" required>
              <option value="">Selecione</option>
              <option value="Masculino">Masculino</option>
              <option value="Feminino">Feminino</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
          
          <div class="form-group">
            <label for="pronome">Pronome de preferência</label>
            <input type="text" id="pronome" class="mystic-input" placeholder="Ex: ela/dela" required />
          </div>
          
          <div class="form-group full-width">
            <label for="estado_civil">Estado Civil</label>
            <input type="text" id="estado_civil" class="mystic-input" placeholder="Ex: Solteiro(a), Casado(a)" required />
          </div>
          
          <!-- Campos Opcionais Condicionais -->
          <div id="religiaoExtras" class="form-group full-width hidden" style="display: grid; grid-template-columns: 1fr; gap: 15px; border-left: 2px solid var(--gold-color); padding-left: 15px; background: rgba(199, 162, 122, 0.03); padding-top: 10px; padding-bottom: 10px; margin-top: 5px;">
            <div class="form-group">
              <label for="guia_espiritual">Guia Espiritual principal</label>
              <input type="text" id="guia_espiritual" class="mystic-input" placeholder="Ex: Caboclo das Sete Encruzilhadas, Preto Velho" />
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="pai_mae_cabeca">Pai/Mãe de Cabeça (Orixás)</label>
                <input type="text" id="pai_mae_cabeca" class="mystic-input" placeholder="Ex: Oxum e Ogum" />
              </div>
              <div class="form-group">
                <label for="tradicao_espiritual">Tradição Espiritual</label>
                <input type="text" id="tradicao_espiritual" class="mystic-input" placeholder="Ex: Wicca Gardeneriana, Quimbanda Jejê" />
              </div>
            </div>
          </div>
        </div>
        
        <button type="submit" id="registerBtn" class="glass-button" style="width: 100%; border-color: var(--gold-color); padding: 12px; justify-content: center; font-weight: 600; margin-top: 15px;">
          <i class="fas fa-user-sparkles"></i> Firmar Cadastro & Entrar
        </button>
      </form>
      
      <div class="register-footer">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Já possui cadastro? Retorne ao Portal de Login</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="assets/js/register_cliente.js"></script>
  <script>
    // Religious details visibility toggle in real-time
    const religiaoSelect = document.getElementById("religiao");
    const religiaoExtras = document.getElementById("religiaoExtras");
    if (religiaoSelect && religiaoExtras) {
      religiaoSelect.addEventListener("change", () => {
        const val = religiaoSelect.value;
        const showExtras = ["Umbanda", "Candomblé", "Quimbanda", "Wicca", "Xamanismo", "Espiritualista"].includes(val);
        if (showExtras) {
          religiaoExtras.classList.remove("hidden");
        } else {
          religiaoExtras.classList.add("hidden");
        }
      });
    }
  </script>
</body>
</html>
